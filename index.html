<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FighterSelection</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    
    <h1> Choose your fighter </h1>
    <p class="subtitle">
     Each class has a unique skill
    </p>

    <div class="cards">
      
      <div class="card">
        <img src="Batduck.jpg" />
        <p>BatDuck</p>
      </div>

      <div class="card">
        <img src="Dr.Strange.jpg" />
        <p>Dr.Strange</p>
      </div>

      <div class="card">
        <img src="Iron-Man.jpg" />
        <p>Iron-Man</p>
      </div>

    </div>

    <button class="btn">Enter the Arena</button>

    <p class="footer">There's no going back</p>

  </div>

</body>
</html>
