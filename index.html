<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FighterSelection</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    
    <h1> Choose your fighter </h1>
    <p class="subtitle">
     Each class has a unique skill
    </p>

    <div class="cards">
      
      <div class="card">
        <img src="https://images.unsplash.com/photo-1559715541-5daf8a0296d0?q=80&w=1372&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" />
        <p>BatDuck</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1640499900704-b00dd6a1103a?q=80&w=1742&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" />
        <p>Dr.Strange</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1635863138275-d9b33299680b?q=80&w=2062&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" />
        <p>Iron-Man</p>
      </div>

    </div>

    <button class="btn">Enter the Arena</button>

    <p class="footer">There's no going back</p>

  </div>

</body>
</html>
